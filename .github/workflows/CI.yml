name: CI Docker OrderManagement

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-ci:
    name: Build Docker and smoke test API
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Vérifier la configuration Docker Compose
        run: docker compose config

      - name: Construire l'image de l'API
        run: docker compose build api

      - name: Lancer SQL Server et l'API
        run: docker compose up -d db api

      - name: Attendre que l'API réponde
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/Product > /dev/null; then
              echo "API disponible"
              exit 0
            fi

            echo "API pas encore disponible, tentative $i/30"
            docker compose ps
            sleep 5
          done

          echo "L'API n'a pas répondu à temps"
          docker compose logs db api
          exit 1

      - name: Smoke test endpoints métier publics
        run: |
          curl -fsS http://localhost:8080/api/Product
          curl -fsS http://localhost:8080/api/Categories

      - name: Afficher les logs en cas d'échec
        if: failure()
        run: docker compose logs db api

      - name: Nettoyer les conteneurs
        if: always()
        run: docker compose down -v
  
  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déploiement simulé
        run: echo "Déploiement de OrderManagement.API en production"



